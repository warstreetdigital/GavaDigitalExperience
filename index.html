        function App() {
            const [phase, setPhase] = useState('landing');
            const [isTransitioning, setIsTransitioning] = useState(false);
            const [messageIndex, setMessageIndex] = useState(0);
            const [crowdPulse, setCrowdPulse] = useState(0.1);

            const messages = [
                "They’ve started without you",
                "The fire is alive tonight",
                "You can hear the music already",
                "People are inside",
                "Your table is waiting",
                "Step inside"
            ];

            const intensity = messageIndex / (messages.length - 1);

            const playTick = useCallback((freq) => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(freq / 2, ctx.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.05, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + 0.05);
                } catch (e) {}
            }, []);

            useEffect(() => {
                if (phase === 'landing') {
                    let timeoutId;
                    const nextMessage = () => {
                        setMessageIndex((prev) => {
                            const next = (prev + 1) % messages.length;
                            const freq = 800 - (next * 100);
                            playTick(Math.max(200, freq));
                            return next;
                        });
                        const isLast = messageIndex === messages.length - 2;
                        const delay = isLast ? 4000 : 2000 + Math.random() * 1500;
                        timeoutId = setTimeout(nextMessage, delay);
                    };
                    timeoutId = setTimeout(nextMessage, 2800);
                    return () => clearTimeout(timeoutId);
                }
            }, [phase, playTick, messages.length, messageIndex]);

            useEffect(() => {
                if (phase === 'landing') {
                    const pulse = () => {
                        setCrowdPulse(0.15);
                        setTimeout(() => setCrowdPulse(0.05), 1000);
                        setTimeout(pulse, 5000 + Math.random() * 5000);
                    };
                    const id = setTimeout(pulse, 3000);
                    return () => clearTimeout(id);
                }
            }, [phase]);

            const handleEnter = () => {
                setIsTransitioning(true);
                setTimeout(() => { setPhase('arrival'); setIsTransitioning(false); }, 1200);
            };

            useEffect(() => {
                if (phase === 'arrival') {
                    const t = setTimeout(() => setPhase('main'), 3800);
                    return () => clearTimeout(t);
                }
            }, [phase]);

                        },

                    }),
                    // 4. Embers (Enhanced)

                        [...Array(20 + Math.floor(intensity * 40))].map((_, i) => React.createElement('div', {

                                animationDelay: `${Math.random()*5}s`,
                                animationDuration: `${2 + Math.random()*6}s`
                            } 
                        }))
                    ),
